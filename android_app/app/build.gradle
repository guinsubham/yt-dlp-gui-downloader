plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "org.icarus.ytdlpgui"
    compileSdk 35

    defaultConfig {
        applicationId "org.icarus.ytdlpgui"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }
}

chaquopy {
    defaultConfig {
        version = "3.12"

        pip {
            install("yt-dlp[default]")
            install("certifi")
            install("requests")
            install("urllib3")
            install("mutagen")
            install("websockets")
            install("pycryptodomex")
            install("brotli")
        }
    }
}
