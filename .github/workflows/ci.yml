name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-tests:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check installed dependencies
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q app.py networking.py runtime_dependencies.py thumbnail_preview.py updater.py tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $scripts = @(
            "install.ps1",
            "packaging\Install-YT-DLP-GUI.ps1",
            "packaging\Uninstall-YT-DLP-GUI.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count) {
              $errors | Format-List | Out-String | Write-Error
            }
          }
