name: Build Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate application version
        shell: powershell
        run: |
          $expectedVersion = "${{ github.ref_name }}".TrimStart("v")
          $match = Select-String -LiteralPath "app.py" -Pattern '^APP_VERSION = "([0-9]+\.[0-9]+\.[0-9]+)"$'
          if (-not $match -or $match.Matches[0].Groups[1].Value -ne $expectedVersion) {
            throw "app.py version does not match release tag ${{ github.ref_name }}."
          }

      - name: Run updater tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: pyinstaller --noconfirm --clean YT-DLP-GUI.spec

      - name: Verify frozen GUI runtime
        shell: powershell
        run: |
          $process = Start-Process -FilePath "dist\YT-DLP-GUI.exe" -ArgumentList "--verify-gui" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "The frozen GUI smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Verify frozen dependencies
        shell: powershell
        run: |
          $process = Start-Process -FilePath "dist\YT-DLP-GUI.exe" -ArgumentList "--verify-dependencies" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "The frozen dependency preflight failed with exit code $($process.ExitCode)."
          }

      - name: Assemble verified installer package
        shell: powershell
        run: |
          $exe = "dist\YT-DLP-GUI.exe"
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash
          $version = "${{ github.ref_name }}".TrimStart("v")
          $installer = (Get-Content -LiteralPath "packaging\Install-YT-DLP-GUI.ps1" -Raw).Replace("__EXPECTED_HASH__", $hash).Replace("__APP_VERSION__", $version)
          Set-Content -LiteralPath "dist\Install-YT-DLP-GUI.ps1" -Value $installer -Encoding UTF8
          $legacyInstaller = (Get-Content -LiteralPath "packaging\Install-YT-DLP-GUI.bat" -Raw).Replace("__EXPECTED_HASH__", $hash).Replace("__APP_VERSION__", $version)
          Set-Content -LiteralPath "dist\Install-YT-DLP-GUI.bat" -Value $legacyInstaller -Encoding ASCII
          Copy-Item -LiteralPath "packaging\Uninstall-YT-DLP-GUI.bat", "packaging\Uninstall-YT-DLP-GUI.ps1" -Destination "dist"
          Copy-Item -LiteralPath "LICENSE", "THIRD_PARTY_NOTICES.md" -Destination "dist"
          Copy-Item -LiteralPath "third_party_licenses" -Destination "dist" -Recurse
          Compress-Archive -LiteralPath $exe, "dist\Install-YT-DLP-GUI.bat", "dist\Install-YT-DLP-GUI.ps1", "dist\Uninstall-YT-DLP-GUI.bat", "dist\Uninstall-YT-DLP-GUI.ps1", "dist\LICENSE", "dist\THIRD_PARTY_NOTICES.md", "dist\third_party_licenses" -DestinationPath "dist\YT-DLP-GUI-Windows.zip" -CompressionLevel Optimal

      - name: Verify packaged installer fingerprint
        shell: powershell
        run: |
          $env:YT_DLP_GUI_VERIFY_ONLY = "1"
          & "dist\Install-YT-DLP-GUI.bat"
          if ($LASTEXITCODE -ne 0) {
            throw "The packaged installer fingerprint check failed with exit code $LASTEXITCODE."
          }

      - name: Attach package to release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $releases = gh release list --limit 100 --json tagName | ConvertFrom-Json
          if ($releases.tagName -contains $tag) {
            gh release upload $tag "dist\YT-DLP-GUI-Windows.zip" --clobber
          } else {
            gh release create $tag "dist\YT-DLP-GUI-Windows.zip" --verify-tag --title "YT-DLP GUI Downloader $tag" --generate-notes
          }
